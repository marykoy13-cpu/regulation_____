<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Экспресс-диагностика мотивационной саморегуляции</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Source Serif 4', Georgia, serif;
  background: #FAFAF7;
  color: #2C2C2A;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 2rem 1.25rem 3rem;
}
.header {
  text-align: center;
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid #E8E6DF;
}
.header .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #888880;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 22px;
  font-weight: 400;
  line-height: 1.35;
  color: #2C2C2A;
  margin-bottom: 8px;
}
.header .sub {
  font-size: 13px;
  color: #888880;
  font-style: italic;
  line-height: 1.5;
}
.question-block {
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid #E8E6DF;
}
.question-block:last-of-type { border-bottom: none; }
.question-top {
  display: flex;
  gap: 14px;
  align-items: baseline;
  margin-bottom: 6px;
}
.question-num {
  font-size: 36px;
  font-weight: 300;
  color: #D3D1C7;
  line-height: 1;
  flex-shrink: 0;
  width: 32px;
  text-align: right;
}
.question-text {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.45;
  color: #2C2C2A;
  margin-bottom: 4px;
}
.question-meta {
  font-size: 11px;
  color: #888880;
  line-height: 1.5;
}
.question-meta em { font-style: italic; }
.options {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-left: 46px;
}
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: transparent;
  border: 1px solid #D3D1C7;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  line-height: 1.55;
  color: #2C2C2A;
  font-family: inherit;
  transition: all 0.15s ease;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.option-btn:active { transform: scale(0.99); }
.option-btn.selected-yes {
  background: #E1F5EE;
  border-color: #5DCAA5;
}
.option-btn.selected-no {
  background: #FAECE7;
  border-color: #F0997B;
}
.radio-circle {
  width: 18px;
  height: 18px;
  min-width: 18px;
  border-radius: 50%;
  border: 2px solid #B4B2A9;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.15s ease;
  flex-shrink: 0;
}
.radio-circle.active-yes {
  border-color: #0F6E56;
  background: #0F6E56;
}
.radio-circle.active-no {
  border-color: #993C1D;
  background: #993C1D;
}
.radio-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #fff;
}
.submit-btn {
  display: block;
  margin: 1.5rem auto 0;
  padding: 14px 48px;
  background: #D3D1C7;
  color: #888880;
  border: none;
  font-size: 15px;
  cursor: not-allowed;
  font-family: inherit;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn.active {
  background: #2C2C2A;
  color: #fff;
  cursor: pointer;
}
.submit-btn.active:active { transform: scale(0.97); }
.progress-text {
  text-align: center;
  font-size: 12px;
  color: #B4B2A9;
  margin-top: 14px;
}

.result-container { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.result-header {
  text-align: center;
  margin-bottom: 2rem;
}
.result-header .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #888880;
  margin-bottom: 10px;
}
.result-header h1 {
  font-size: 24px;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 8px;
}
.result-header .sub {
  font-size: 14px;
  font-style: italic;
}
.result-box {
  padding: 1.5rem;
  margin-bottom: 2rem;
  border-left: 3px solid;
}
.result-box .box-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 14px;
}
.rec-item {
  margin-bottom: 16px;
}
.rec-item:last-child { margin-bottom: 0; }
.rec-item p {
  font-size: 14px;
  line-height: 1.6;
  color: #2C2C2A;
  margin-bottom: 2px;
}
.rec-item .src {
  font-size: 11px;
  color: #888880;
  font-style: italic;
}
.score-text {
  font-size: 14px;
  line-height: 1.7;
  color: #5F5E5A;
  margin-bottom: 2rem;
}
.score-text strong { font-weight: 600; }
.methodology {
  border-top: 1px solid #D3D1C7;
  padding-top: 1.5rem;
  margin-bottom: 2rem;
}
.methodology .m-label {
  font-size: 12px;
  font-weight: 600;
  color: #5F5E5A;
  margin-bottom: 8px;
}
.methodology p {
  font-size: 11px;
  color: #888880;
  line-height: 1.6;
}
.reset-btn {
  display: block;
  margin: 0 auto;
  padding: 12px 32px;
  background: transparent;
  border: 1px solid #B4B2A9;
  font-size: 14px;
  color: #5F5E5A;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.reset-btn:active { transform: scale(0.97); }
.author-footer {
  text-align: center;
  margin-top: 2.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid #E8E6DF;
  font-size: 11px;
  color: #B4B2A9;
  line-height: 1.6;
}
@media (max-width: 480px) {
  .container { padding: 1.5rem 1rem 2.5rem; }
  .header h1 { font-size: 19px; }
  .question-num { font-size: 28px; width: 24px; }
  .options { padding-left: 38px; }
  .option-btn { font-size: 13px; padding: 12px 14px; }
  .result-header h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const questions = [
  {
    id: 1,
    text: "Когда мотивация падает, вы это замечаете?",
    link: "Звено: распознавание мотивационного спада",
    source: "[Вильяр и соавт., 2024; Уолтерс, 2003]",
    options: [
      { text: "Да \u2014 чувствую момент, когда становится скучно, тяжело или бессмысленно", value: true },
      { text: "Нет \u2014 просто перестаю делать, не понимая почему", value: false }
    ]
  },
  {
    id: 2,
    text: "Что вы делаете, когда не хочется продолжать?",
    link: "Звено: выбор стратегии регуляции",
    source: "[Вильяр и соавт., 2024; Фонг и соавт., 2025; Уолтерс, 2003]",
    options: [
      { text: "Конкретное действие: разбиваю задачу, напоминаю себе о цели, переключаю формат", value: true },
      { text: "\u00ABЗаставляю себя\u00BB волевым усилием \u2014 или бросаю", value: false }
    ]
  },
  {
    id: 3,
    text: "Верите ли вы, что можете справиться со спадом мотивации?",
    link: "Конструкт: самоэффективность для мотивационной регуляции",
    source: "[Крышко и соавт., 2022; 2026]",
    options: [
      { text: "Да \u2014 справлялся(-ась) раньше, справлюсь снова", value: true },
      { text: "Нет \u2014 это сильнее меня, я не контролирую", value: false }
    ]
  },
  {
    id: 4,
    text: "Как вы относитесь к ИИ-инструментам в обучении?",
    link: "Конструкт: готовность к ИИ-поддержке",
    source: "[Арпаджи, Кушчи, Гибриил, 2025]",
    options: [
      { text: "Использую \u2014 они помогают структурировать и рефлексировать", value: true },
      { text: "Избегаю \u2014 вызывают стресс или не вижу смысла", value: false }
    ]
  }
];

const profiles = {
  A: {
    title: "Профиль А: развитая саморегуляция",
    subtitle: "ИИ-инструменты будут для вас эффективны",
    color: "#0F6E56",
    bg: "#E1F5EE",
    border: "#5DCAA5",
    items: [
      { text: "Используйте ИИ для структурированной рефлексии и самооценивания \u2014 данные показывают связь с улучшением мотивации и самооценки компетентности.", src: "[Хейдарнеджад, 2025]" },
      { text: "Расширяйте репертуар стратегий: мета-анализы выделяют повышение ценности задачи и управление интересом как наиболее адаптивные.", src: "[Фонг и соавт., 2025]" },
      { text: "Вы можете быть peer-ментором для других \u2014 воспринимаемая поддержка сверстников запускает стратегии мотивационной регуляции, усиливая и вашу собственную.", src: "[Вильяр и соавт., 2025]" }
    ]
  },
  B: {
    title: "Профиль Б: саморегуляция в развитии",
    subtitle: "Начинайте с социального контекста, не с технологии",
    color: "#993C1D",
    bg: "#FAECE7",
    border: "#F0997B",
    items: [
      { text: "Ищите социальный контекст: peer support, учебный партнёр, малая группа \u2014 воспринимаемая поддержка сверстников запускает конкретные стратегии мотивационной регуляции.", src: "[Вильяр и соавт., 2025]" },
      { text: "Первый шаг \u2014 обеспечить опыт успешного совладания со спадом в поддерживающих условиях: самоэффективность растёт через опыт, не через инструкцию.", src: "[Крышко и соавт., 2022]" },
      { text: "Освойте одну адаптивную стратегию \u2014 например, постановку подцелей: разбейте неподъёмное на управляемые куски.", src: "[Фонг и соавт., 2025]" }
    ]
  }
};

const scoreMessages = [
  "Большинство звеньев пока не работают. Это нормально \u2014 мотивационная саморегуляция не врождённое качество, а навык, который развивается через опыт [Крышко и соавт., 2026]. Начните с peer support.",
  "Большинство звеньев пока не работают. Это нормально \u2014 мотивационная саморегуляция не врождённое качество, а навык, который развивается через опыт [Крышко и соавт., 2026]. Начните с peer support.",
  "Два звена работают, два \u2014 нет. Начните с социального контекста и освоения одной конкретной стратегии.",
  "Три звена работают. Обратите внимание на то, которое пока не работает \u2014 это ваша точка роста.",
  "Все четыре звена функционируют. Вы способны распознавать спад, использовать стратегии, верите в свою способность справиться и открыты к ИИ-инструментам."
];

let answers = {};

function render() {
  const app = document.getElementById("app");
  const answered = Object.keys(answers).length;
  const allDone = answered === 4;

  let html = `
    <div class="header">
      <div class="label">экспресс-диагностика</div>
      <h1>К какому типу мотивационной саморегуляции вы относитесь?</h1>
      <div class="sub">4 вопроса \u2014 каждый привязан к конкретному звену процесса из академических исследований</div>
    </div>
  `;

  questions.forEach(q => {
    html += `<div class="question-block">
      <div class="question-top">
        <span class="question-num">${q.id}</span>
        <div>
          <div class="question-text">${q.text}</div>
          <div class="question-meta">${q.link} <em>${q.source}</em></div>
        </div>
      </div>
      <div class="options">`;

    q.options.forEach((opt, oi) => {
      const sel = answers[q.id] === opt.value;
      const selClass = sel ? (opt.value ? "selected-yes" : "selected-no") : "";
      const circleClass = sel ? (opt.value ? "active-yes" : "active-no") : "";
      html += `<button class="option-btn ${selClass}" onclick="selectAnswer(${q.id}, ${opt.value})">
        <span class="radio-circle ${circleClass}">${sel ? '<span class="radio-dot"></span>' : ""}</span>
        <span>${opt.text}</span>
      </button>`;
    });

    html += `</div></div>`;
  });

  html += `<button class="submit-btn ${allDone ? "active" : ""}" ${allDone ? 'onclick="showResult()"' : "disabled"}>Узнать результат</button>`;
  html += `<div class="progress-text">${allDone ? "Все вопросы отвечены" : "Отвечено: " + answered + " из 4"}</div>`;

  app.innerHTML = html;
}

function selectAnswer(qId, val) {
  answers[qId] = val;
  render();
}

function showResult() {
  const trueCount = Object.values(answers).filter(v => v === true).length;
  const p = trueCount >= 3 ? profiles.A : profiles.B;
  const app = document.getElementById("app");

  let recs = "";
  p.items.forEach(item => {
    recs += `<div class="rec-item">
      <p>${item.text}</p>
      <span class="src">${item.src}</span>
    </div>`;
  });

  app.innerHTML = `
    <div class="result-container">
      <div class="result-header">
        <div class="label">результат диагностики</div>
        <h1 style="color:${p.color}">${p.title}</h1>
        <div class="sub" style="color:${p.color}88">${p.subtitle}</div>
      </div>

      <div class="result-box" style="background:${p.bg};border-left-color:${p.border}">
        <div class="box-label" style="color:${p.color}">Рекомендации</div>
        ${recs}
      </div>

      <div class="score-text">
        <p style="margin-bottom:12px">Ваши ответы: <strong>${trueCount} из 4</strong> звеньев мотивационной саморегуляции работают.</p>
        <p>${scoreMessages[trueCount]}</p>
      </div>

      <div class="methodology">
        <div class="m-label">Методологическая справка</div>
        <p>Это экспресс-диагностика, а не психодиагностический инструмент. Каждый вопрос привязан к конкретному конструкту из литературы: распознавание спада [Вильяр и соавт., 2024], репертуар стратегий [Фонг и соавт., 2025], самоэффективность для мотивационной регуляции [Крышко и соавт., 2022; 2026], готовность к ИИ-поддержке [Арпаджи и соавт., 2025]. Для валидации как самостоятельного инструмента необходимо отдельное исследование.</p>
      </div>

      <button class="reset-btn" onclick="resetTest()">Пройти заново</button>

      <div class="author-footer">
        Мотивационная саморегуляция студентов в онлайн-обучении<br>
        Андриевская М.В. \u2014 Школа управления СКОЛКОВО, 2026
      </div>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetTest() {
  answers = {};
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

render();
</script>
</body>
</html>
